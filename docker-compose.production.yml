services:
  youtube-dashboard-next:
    environment:
      ENGINE_API_BASE_URL: "${ENGINE_API_BASE_URL:-http://automation-api:8080}"
      NEXT_PUBLIC_ENGINE_API_BASE_URL: "${NEXT_PUBLIC_ENGINE_API_BASE_URL:?set NEXT_PUBLIC_ENGINE_API_BASE_URL}"
      DASHBOARD_AUTH_ENABLED: "1"
      DASHBOARD_AUTH_SECRET: "${DASHBOARD_AUTH_SECRET:?set DASHBOARD_AUTH_SECRET}"
      DASHBOARD_VIEWER_USERNAME: "${DASHBOARD_VIEWER_USERNAME:?set DASHBOARD_VIEWER_USERNAME}"
      DASHBOARD_VIEWER_PASSWORD: "${DASHBOARD_VIEWER_PASSWORD:?set DASHBOARD_VIEWER_PASSWORD}"
      DASHBOARD_OPERATOR_USERNAME: "${DASHBOARD_OPERATOR_USERNAME:?set DASHBOARD_OPERATOR_USERNAME}"
      DASHBOARD_OPERATOR_PASSWORD: "${DASHBOARD_OPERATOR_PASSWORD:?set DASHBOARD_OPERATOR_PASSWORD}"
      DASHBOARD_ADMIN_USERNAME: "${DASHBOARD_ADMIN_USERNAME:?set DASHBOARD_ADMIN_USERNAME}"
      DASHBOARD_ADMIN_PASSWORD: "${DASHBOARD_ADMIN_PASSWORD:?set DASHBOARD_ADMIN_PASSWORD}"
