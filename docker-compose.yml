services:
  automation-postgres:
    image: postgres:16-alpine
    container_name: ai-youtube-langchain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: automation_local
      POSTGRES_USER: automation_local
      POSTGRES_PASSWORD: change-me-local-postgres-password
    ports:
      - "5432:5432"
    volumes:
      - automation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation_local -d automation_local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  automation-redis:
    image: redis:7-alpine
    container_name: ai-youtube-langchain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - automation_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  automation-api:
    build:
      context: ../ai-youtube-langchain
      dockerfile: Dockerfile.core
    image: ai-youtube-langchain:local
    container_name: ai-youtube-langchain-api
    restart: unless-stopped
    env_file:
      - ../ai-youtube-langchain/.env
    environment:
      PYTHONUNBUFFERED: "1"
      ENABLE_YOUTUBE_UPLOAD: "0"
      YOUTUBE_UPLOAD_ENABLED: "0"
      YOUTUBE_UPLOAD_REQUIRE_APPROVAL: "1"
      AUDIO_MODE: "${AUDIO_MODE:-source_audio_if_allowed}"
      AUDIO_ALLOW_SOURCE_AUDIO: "${AUDIO_ALLOW_SOURCE_AUDIO:-1}"
      AUDIO_ALLOW_PLACEHOLDER_TONE: "0"
      BACKGROUND_MUSIC_MODE: "${BACKGROUND_MUSIC_MODE:-no_music}"
      BACKGROUND_MUSIC_VOLUME: "0.15"
      PRODUCTION_AUDIO_MODE: "legal_voiceover_required"
      SOURCE_AUDIO_FOR_PRODUCTION: "0"
      REUSED_CONTENT_BLOCK_HIGH_RISK: "1"
      UPLOAD_BLOCK_UNKNOWN_RIGHTS: "1"
      AI_DISCLOSURE_REQUIRED_WHEN_REALISTIC: "1"
      AUTOMATION_AUTO_BACKUP_ENABLED: "0"
      AUTOMATION_BACKUP_INTERVAL_HOURS: "24"
      AUTOMATION_BACKUP_KEEP_COUNT: "1"
      YOUTUBE_OAUTH_CLIENT_FILE: "/app/credentials/youtube-oauth-client.json"
      YOUTUBE_OAUTH_TOKEN_FILE: "/app/credentials/youtube-oauth-token.json"
      LLM_PROVIDER: "local_disabled"
      YTDLP_COOKIES_FILE: "/app/assets/cookies/youtube.txt"
      LOCAL_SOURCE_ROOTS: "downloads,assets/sources"
      AUTOMATION_API_CORS_ORIGINS: "http://localhost:3001,http://127.0.0.1:3001,http://localhost:8088,http://127.0.0.1:8088"
      DATABASE_URL: "postgresql://automation_local:change-me-local-postgres-password@automation-postgres:5432/automation_local"
      AUTOMATION_DASHBOARD_REDIS_ENABLED: "1"
      AUTOMATION_DASHBOARD_REDIS_URL: "redis://automation-redis:6379/0"
      AUTOMATION_DASHBOARD_REDIS_PREFIX: "automation:runtime"
      AUTOMATION_WORKER_SERVICE_URL: "http://automation-worker:8091"
      AUTOMATION_PUBLISHER_SERVICE_URL: "http://automation-publisher:8092"
    command:
      - uvicorn
      - src.automation.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ../ai-youtube-langchain/config:/app/config
      - ../ai-youtube-langchain/data:/app/data
      - ../ai-youtube-langchain/output:/app/output
      - ../ai-youtube-langchain/downloads:/app/downloads
      - ../ai-youtube-langchain/assets/cookies:/app/assets/cookies
      - ../ai-youtube-langchain/.ai-agent:/app/.ai-agent
      - ../ai-youtube-langchain/credentials:/app/credentials
    depends_on:
      automation-postgres:
        condition: service_healthy
      automation-redis:
        condition: service_healthy
      automation-worker:
        condition: service_healthy
      automation-publisher:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  automation-scheduler:
    build:
      context: ../ai-youtube-langchain
      dockerfile: Dockerfile.core
    image: ai-youtube-langchain:local
    container_name: ai-youtube-langchain-scheduler
    restart: unless-stopped
    env_file:
      - ../ai-youtube-langchain/.env
    environment:
      PYTHONUNBUFFERED: "1"
      ENABLE_YOUTUBE_UPLOAD: "0"
      YOUTUBE_UPLOAD_ENABLED: "0"
      YOUTUBE_UPLOAD_REQUIRE_APPROVAL: "1"
      AUDIO_MODE: "${AUDIO_MODE:-source_audio_if_allowed}"
      AUDIO_ALLOW_SOURCE_AUDIO: "${AUDIO_ALLOW_SOURCE_AUDIO:-1}"
      AUDIO_ALLOW_PLACEHOLDER_TONE: "0"
      BACKGROUND_MUSIC_MODE: "${BACKGROUND_MUSIC_MODE:-no_music}"
      BACKGROUND_MUSIC_VOLUME: "0.15"
      PRODUCTION_AUDIO_MODE: "legal_voiceover_required"
      SOURCE_AUDIO_FOR_PRODUCTION: "0"
      REUSED_CONTENT_BLOCK_HIGH_RISK: "1"
      UPLOAD_BLOCK_UNKNOWN_RIGHTS: "1"
      AI_DISCLOSURE_REQUIRED_WHEN_REALISTIC: "1"
      AUTOMATION_AUTO_BACKUP_ENABLED: "0"
      AUTOMATION_BACKUP_INTERVAL_HOURS: "24"
      AUTOMATION_BACKUP_KEEP_COUNT: "1"
      YOUTUBE_OAUTH_CLIENT_FILE: "/app/credentials/youtube-oauth-client.json"
      YOUTUBE_OAUTH_TOKEN_FILE: "/app/credentials/youtube-oauth-token.json"
      LLM_PROVIDER: "local_disabled"
      YTDLP_COOKIES_FILE: "/app/assets/cookies/youtube.txt"
      LOCAL_SOURCE_ROOTS: "downloads,assets/sources"
      DATABASE_URL: "postgresql://automation_local:change-me-local-postgres-password@automation-postgres:5432/automation_local"
      AUTOMATION_DASHBOARD_REDIS_ENABLED: "1"
      AUTOMATION_DASHBOARD_REDIS_URL: "redis://automation-redis:6379/0"
      AUTOMATION_DASHBOARD_REDIS_PREFIX: "automation:runtime"
    command:
      - python
      - -m
      - src.automation.cli
      - scheduler
      - --days-ahead
      - "1"
      - --interval-minutes
      - "30"
    volumes:
      - ../ai-youtube-langchain/config:/app/config
      - ../ai-youtube-langchain/data:/app/data
      - ../ai-youtube-langchain/output:/app/output
      - ../ai-youtube-langchain/downloads:/app/downloads
      - ../ai-youtube-langchain/assets/cookies:/app/assets/cookies
      - ../ai-youtube-langchain/.ai-agent:/app/.ai-agent
      - ../ai-youtube-langchain/credentials:/app/credentials
    depends_on:
      automation-postgres:
        condition: service_healthy
      automation-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "src.automation.cli", "health", "--recover-stuck", "--stuck-minutes", "60", "--max-retries", "3"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  automation-worker:
    build:
      context: ../ai-youtube-langchain
      dockerfile: Dockerfile.worker
    image: ai-youtube-langchain-worker:local
    container_name: ai-youtube-langchain-worker
    restart: unless-stopped
    env_file:
      - ../ai-youtube-langchain/.env
    environment:
      PYTHONUNBUFFERED: "1"
      ENABLE_YOUTUBE_UPLOAD: "0"
      YOUTUBE_UPLOAD_ENABLED: "0"
      YOUTUBE_UPLOAD_REQUIRE_APPROVAL: "1"
      AUDIO_MODE: "${AUDIO_MODE:-source_audio_if_allowed}"
      AUDIO_ALLOW_SOURCE_AUDIO: "${AUDIO_ALLOW_SOURCE_AUDIO:-1}"
      AUDIO_ALLOW_PLACEHOLDER_TONE: "0"
      BACKGROUND_MUSIC_MODE: "${BACKGROUND_MUSIC_MODE:-no_music}"
      BACKGROUND_MUSIC_VOLUME: "0.15"
      PRODUCTION_AUDIO_MODE: "legal_voiceover_required"
      SOURCE_AUDIO_FOR_PRODUCTION: "0"
      REUSED_CONTENT_BLOCK_HIGH_RISK: "1"
      UPLOAD_BLOCK_UNKNOWN_RIGHTS: "1"
      AI_DISCLOSURE_REQUIRED_WHEN_REALISTIC: "1"
      AUTOMATION_AUTO_BACKUP_ENABLED: "0"
      AUTOMATION_BACKUP_INTERVAL_HOURS: "24"
      AUTOMATION_BACKUP_KEEP_COUNT: "1"
      YOUTUBE_OAUTH_CLIENT_FILE: "/app/credentials/youtube-oauth-client.json"
      YOUTUBE_OAUTH_TOKEN_FILE: "/app/credentials/youtube-oauth-token.json"
      LLM_PROVIDER: "local_disabled"
      YTDLP_COOKIES_FILE: "/app/assets/cookies/youtube.txt"
      LOCAL_SOURCE_ROOTS: "downloads,assets/sources"
      DATABASE_URL: "postgresql://automation_local:change-me-local-postgres-password@automation-postgres:5432/automation_local"
      AUTOMATION_DASHBOARD_REDIS_ENABLED: "1"
      AUTOMATION_DASHBOARD_REDIS_URL: "redis://automation-redis:6379/0"
      AUTOMATION_DASHBOARD_REDIS_PREFIX: "automation:runtime"
      AUTOMATION_WORKER_SERVICE_URL: "http://automation-worker:8091"
    command:
      - uvicorn
      - src.worker_service.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8091"
    ports:
      - "8091:8091"
    volumes:
      - ../ai-youtube-langchain/config:/app/config
      - ../ai-youtube-langchain/data:/app/data
      - ../ai-youtube-langchain/output:/app/output
      - ../ai-youtube-langchain/downloads:/app/downloads
      - ../ai-youtube-langchain/assets/cookies:/app/assets/cookies
      - ../ai-youtube-langchain/.ai-agent:/app/.ai-agent
      - ../ai-youtube-langchain/credentials:/app/credentials
    depends_on:
      automation-postgres:
        condition: service_healthy
      automation-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=5)"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  automation-publisher:
    build:
      context: ../ai-youtube-langchain
      dockerfile: Dockerfile.publisher
    image: ai-youtube-langchain-publisher:local
    container_name: ai-youtube-langchain-publisher
    restart: unless-stopped
    env_file:
      - ../ai-youtube-langchain/.env
    environment:
      PYTHONUNBUFFERED: "1"
      YOUTUBE_UPLOAD_ENABLED: "0"
      YOUTUBE_UPLOAD_REQUIRE_APPROVAL: "1"
      AUDIO_MODE: "${AUDIO_MODE:-source_audio_if_allowed}"
      AUDIO_ALLOW_SOURCE_AUDIO: "${AUDIO_ALLOW_SOURCE_AUDIO:-1}"
      AUDIO_ALLOW_PLACEHOLDER_TONE: "0"
      BACKGROUND_MUSIC_MODE: "${BACKGROUND_MUSIC_MODE:-no_music}"
      BACKGROUND_MUSIC_VOLUME: "0.15"
      PRODUCTION_AUDIO_MODE: "legal_voiceover_required"
      SOURCE_AUDIO_FOR_PRODUCTION: "0"
      REUSED_CONTENT_BLOCK_HIGH_RISK: "1"
      UPLOAD_BLOCK_UNKNOWN_RIGHTS: "1"
      AI_DISCLOSURE_REQUIRED_WHEN_REALISTIC: "1"
      AUTOMATION_AUTO_BACKUP_ENABLED: "0"
      AUTOMATION_BACKUP_INTERVAL_HOURS: "24"
      AUTOMATION_BACKUP_KEEP_COUNT: "1"
      YOUTUBE_OAUTH_CLIENT_FILE: "/app/credentials/youtube-oauth-client.json"
      YOUTUBE_OAUTH_TOKEN_FILE: "/app/credentials/youtube-oauth-token.json"
      LOCAL_SOURCE_ROOTS: "downloads,assets/sources"
      AUTOMATION_PUBLISHER_SERVICE_URL: "http://automation-publisher:8092"
    command:
      - uvicorn
      - src.publisher_service.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8092"
    ports:
      - "8092:8092"
    volumes:
      - ../ai-youtube-langchain/config:/app/config
      - ../ai-youtube-langchain/data:/app/data
      - ../ai-youtube-langchain/output:/app/output
      - ../ai-youtube-langchain/downloads:/app/downloads
      - ../ai-youtube-langchain/.ai-agent:/app/.ai-agent
      - ../ai-youtube-langchain/credentials:/app/credentials
    depends_on:
      automation-postgres:
        condition: service_healthy
      automation-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health', timeout=5)"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  youtube-dashboard-next:
    build:
      context: ./dashboard-next
      dockerfile: Dockerfile
    image: ai-youtube-dashboard-next:local
    container_name: ai-youtube-dashboard-next
    restart: unless-stopped
    environment:
      ENGINE_API_BASE_URL: "http://automation-api:8080"
      NEXT_PUBLIC_ENGINE_API_BASE_URL: "http://localhost:8080"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      ENGINE_SYNC_STATE_VIEW: "default"
      ENGINE_SYNC_WEBSOCKET_ENABLED: "1"
      ENGINE_SYNC_POLLING_INTERVAL_MS: "15000"
      DASHBOARD_AUTH_ENABLED: "0"
      DASHBOARD_AUTH_SECRET: ""
      DASHBOARD_VIEWER_USERNAME: ""
      DASHBOARD_VIEWER_PASSWORD: ""
      DASHBOARD_OPERATOR_USERNAME: ""
      DASHBOARD_OPERATOR_PASSWORD: ""
      DASHBOARD_ADMIN_USERNAME: ""
      DASHBOARD_ADMIN_PASSWORD: ""
    ports:
      - "3001:3000"
    depends_on:
      automation-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  youtube-dashboard:
    profiles:
      - legacy
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-youtube-dashboard:local
    container_name: ai-youtube-dashboard
    restart: unless-stopped
    ports:
      - "8088:80"

volumes:
  automation_postgres_data:
  automation_redis_data:
